server {
    listen 80;

    # 1. Handle Frontend Static Files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy Admin/API requests to the Backend container
    # Adjust '/admin' or '/api' depending on where your backend routes live
    location /admin {
        proxy_pass http://backend:8080; # 'backend' is the container name
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}